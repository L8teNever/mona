<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONA – System Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/mona.css">
</head>
<body>

<!-- INTRO OVERLAY -->
<div id="intro-overlay" onclick="skipIntro()">
    <div class="skip-btn">Überspringen →</div>
    <div class="m3-blob" style="width:300px;height:300px;background:#e9d5ff;top:-10%;left:-10%;"></div>
    <div class="m3-blob" style="width:400px;height:400px;background:#dbeafe;bottom:10%;right:-10%;animation-delay:-3s;"></div>
    <div class="intro-text-container" id="intro-text"></div>
</div>

<!-- APP shell — views are loaded dynamically -->
<div class="mx-auto p-4 md:p-10 app-container" id="main-app">
    <div id="view-container"></div>
</div>

<!-- Metric metadata from server, used by SPA router -->
<script>const METRIC_META = {{ metrics | tojson }};</script>
<script src="/static/js/mona.js"></script>
<script>
    // boot is handled in mona.js DOMContentLoaded
</script>
</body>
</html>
