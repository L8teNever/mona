<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONA – {{ meta.label }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/mona.css">
</head>
<body>
<div class="mx-auto p-4 md:p-10">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-8">
        <div class="flex items-center gap-4">
            <a href="/" class="back-btn-icon shadow-sm" aria-label="Zurück">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
            </a>
            <div>
                <h2 class="text-xl md:text-3xl font-bold">{{ meta.label }}</h2>
                <p class="text-sm opacity-50 mt-0.5" id="live-value">Lade…</p>
            </div>
        </div>
        <div class="time-chips">
            <button class="time-chip active" onclick="loadRange('1h', this)">1 Std.</button>
            <button class="time-chip" onclick="loadRange('24h', this)">24 Std.</button>
            <button class="time-chip" onclick="loadRange('7d', this)">7 Tage</button>
            <button class="time-chip" onclick="loadRange('30d', this)">30 Tage</button>
        </div>
    </div>

    <!-- Chart card -->
    <div class="bg-white border border-gray-100 rounded-3xl p-6 shadow-sm" style="height:450px;">
        <canvas id="chart-detail"></canvas>
    </div>

</div>

<script>
    const METRIC_TYPE = "{{ metric_type }}";
    const METRIC_COLOR = "{{ meta.color }}";
    const METRIC_UNIT = "{{ meta.unit }}";
</script>
<script src="/static/js/mona.js"></script>
<script>
    initDetailPage();
</script>
</body>
</html>
