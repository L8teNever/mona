<div class="flex flex-wrap items-center justify-between gap-3 mb-8">
    <div class="flex items-center gap-4">
        <button onclick="navigateTo('dashboard')" class="back-btn-icon shadow-sm" aria-label="Zurück">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div>
            <h2 id="detail-title" class="text-xl md:text-3xl font-bold">Details</h2>
            <p id="live-value" class="text-sm opacity-50 mt-0.5"></p>
        </div>
    </div>

    <div class="time-chips">
        <button id="breakdown-toggle" class="time-chip" onclick="toggleBreakdownMode()" style="display:none;margin-right:8px;border-color:#6750a4;color:#6750a4;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;margin-right:6px;vertical-align:text-bottom;"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
            Analyse
        </button>
        <button class="time-chip active" onclick="loadRange('1h', this)">1 Std.</button>
        <button class="time-chip" onclick="loadRange('24h', this)">24 Std.</button>
        <button class="time-chip" onclick="loadRange('7d', this)">7 Tage</button>
        <button class="time-chip" onclick="loadRange('30d', this)">30 Tage</button>
        <button class="time-chip range-toggle-btn" onclick="toggleRangePicker(this)" aria-expanded="false" title="Benutzerdefinierter Zeitraum">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </button>
    </div>
</div>
<div class="custom-range-row" id="range-picker">
    <input type="datetime-local" id="range-from" class="datetime-input">
    <span class="range-sep">–</span>
    <input type="datetime-local" id="range-to" class="datetime-input">
    <button onclick="loadCustomRange(this)" class="range-apply-btn">Anzeigen</button>
</div>

<div class="chart-card" style="height:480px; position:relative;">
    <canvas id="chart-detail"></canvas>
</div>

<div id="no-data-msg" style="display:none; position:absolute; inset:0; flex-direction:column; align-items:center; justify-content:center; background:rgba(255,255,255,0.8); border-radius:32px; z-index:10;">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6750a4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.2;margin-bottom:16px;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <p style="font-weight:600; color:#6750a4; opacity:0.6;">Keine Daten für diesen Zeitraum verfügbar</p>
</div>
